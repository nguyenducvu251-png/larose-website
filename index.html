<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaRose Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  color: #222;
}

/* HEADER */
header {
  position: fixed;
  width: 100%;
  padding: 25px 60px;
  display: flex;
  justify-content: space-between;
  z-index: 100;
  color: white;
}

.logo {
  font-family: 'Playfair Display';
  font-size: 22px;
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1519741497674-611481863552') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display';
  font-size: 70px;
  color: white;
  line-height: 1.2;
}

.hero button {
  margin-top: 20px;
  padding: 12px 30px;
  border: none;
  background: white;
  cursor: pointer;
}

/* SECTION */
.section {
  padding: 120px 20px;
  text-align: center;
  opacity: 0;
  transform: translateY(50px);
  transition: 1s;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

/* IMAGE FULL */
.full-img {
  width: 100%;
  height: 500px;
  object-fit: cover;
}

/* SERVICES */
.services {
  display: flex;
  justify-content: center;
  gap: 40px;
}

.card {
  width: 250px;
}

/* AI */
.ai {
  max-width: 500px;
  margin: auto;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
}

/* FOOTER */
footer {
  padding: 40px;
  text-align: center;
  background: #111;
  color: white;
}
</style>
</head>

<body>

<header>
  <div class="logo">LaRose</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Creating<br>Timeless Moments</h1>
    <button>Explore</button>
  </div>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>About Us</h2>
  <p>We craft luxurious and emotional experiences for your most special moments.</p>
</section>

<img class="full-img" src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">

<!-- SERVICES -->
<section class="section">
  <h2>Services</h2>
  <div class="services">
    <div class="card">Birthday Styling</div>
    <div class="card">Proposal Setup</div>
    <div class="card">Private Events</div>
  </div>
</section>

<img class="full-img" src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc">

<!-- AI -->
<section class="section">
  <h2>AI Planner</h2>

  <div class="ai">
    <input id="budget" placeholder="Budget (VD: 5 triệu)">
    
    <select id="event">
      <option>Birthday</option>
      <option>Proposal</option>
    </select>

    <select id="style">
      <option>Romantic</option>
      <option>Luxury</option>
    </select>

    <button onclick="gen()">Generate Concept</button>

    <div id="out"></div>
  </div>
</section>

<footer>
  © 2026 LaRose Planner
</footer>

<script>
// SCROLL ANIMATION
const sections = document.querySelectorAll('.section');

window.addEventListener('scroll', () => {
  sections.forEach(sec => {
    let top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add('show');
    }
  });
});

// AI DEMO
function gen(){
  let b = document.getElementById("budget").value;
  let e = document.getElementById("event").value;
  let s = document.getElementById("style").value;

  document.getElementById("out").innerHTML =
  `<p><b>Concept:</b> ${s} ${e} setup với tone pastel + ánh sáng + backdrop cao cấp.</p>
   <p><b>Budget:</b> ${b}</p>`;
}
</script>

</body>
</html>
